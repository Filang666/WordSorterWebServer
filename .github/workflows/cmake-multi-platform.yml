name: CMake with Boost and Ninja

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # --- WINDOWS ONLY: Активация компилятора CL (MSVC) ---
    - name: Set up MSVC Developer Command Prompt
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # --- LINUX ONLY: Зависимости ---
    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y libboost-all-dev ninja-build

    # --- WINDOWS ONLY: Настройка Ninja и vcpkg ---
    - name: Install Ninja (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja

    - name: Cache vcpkg (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: |
          vcpkg
          !vcpkg/buildtrees
          !vcpkg/packages
          !vcpkg/downloads
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Setup vcpkg (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (!(Test-Path "vcpkg")) {
          git clone https://github.com
        }
        if (!(Test-Path "vcpkg\vcpkg.exe")) {
          cd vcpkg
          .\bootstrap-vcpkg.bat
          cd ..
        }
        .\vcpkg\vcpkg install boost --triplet x64-windows

    # --- ОБЩИЕ ШАГИ ---
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    # Конфигурация для Linux (Bash)
    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
              -G Ninja \
              -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
              -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
              -S ${{ github.workspace }}

    # Конфигурация для Windows (PowerShell)
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cmake -B ${{ steps.strings.outputs.build-output-dir }} `
              -G Ninja `
              -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}\vcpkg\scripts\buildsystems\vcpkg.cmake" `
              -S ${{ github.workspace }}

    # Сборка
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    # Тесты
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
